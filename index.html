<html lang="ru" style="--tg-viewport-height: 100vh; --tg-viewport-stable-height: 100vh;"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финучёт — учёт финансов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --navy-950:#0A1928;
    --navy-900:#0F2740;
    --navy-850:#13304F;
    --blueprint-line:#28496E;
    --blueprint-line-soft:#1C3854;
    --paper:#E9F0F8;
    --text-primary:#EAF2FB;
    --text-muted:#8FA6C2;
    --text-faint:#5E7996;
    --amber:#E8A33D;
    --amber-soft:#3A2F1C;
    --mint:#4ADE80;
    --mint-soft:#12331F;
    --coral:#F2685C;
    --coral-soft:#3A1D1A;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      linear-gradient(var(--navy-950), var(--navy-950)),
      repeating-linear-gradient(0deg, var(--blueprint-line-soft) 0 1px, transparent 1px 32px),
      repeating-linear-gradient(90deg, var(--blueprint-line-soft) 0 1px, transparent 1px 32px);
    background-blend-mode:normal;
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  ::selection{background:var(--amber);color:var(--navy-950);}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}

  /* ---------- Title block header ---------- */
  .titleblock{
    max-width:1100px;
    margin:24px auto 0;
    padding:0 20px;
  }
  .titleblock-inner{
    border:1px solid var(--blueprint-line);
    border-radius:var(--radius);
    background:var(--navy-900);
    display:flex;
    flex-wrap:wrap;
    overflow:hidden;
  }
  .tb-brand{
    padding:18px 22px;
    flex:1 1 260px;
    border-right:1px solid var(--blueprint-line);
  }
  .tb-brand h1{
    font-size:22px;
    letter-spacing:0.02em;
    color:var(--text-primary);
  }
  .tb-brand p{
    margin:4px 0 0;
    font-size:13px;
    color:var(--text-muted);
  }
  .tb-meta{
    display:flex;
    flex:1 1 320px;
  }
  .tb-cell{
    flex:1;
    padding:12px 16px;
    border-right:1px solid var(--blueprint-line-soft);
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:2px;
  }
  .tb-cell:last-child{border-right:none;}
  .tb-cell .label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);}
  .tb-cell .value{font-size:14px;color:var(--amber);}

  /* ---------- Tabs ---------- */
  .tabs{
    max-width:1100px;
    margin:14px auto 0;
    padding:0 20px;
    display:flex;
    gap:6px;
  }
  .tab-btn{
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    font-weight:600;
    background:var(--navy-900);
    color:var(--text-muted);
    border:1px solid var(--blueprint-line);
    border-bottom:none;
    border-radius:8px 8px 0 0;
    padding:10px 20px;
    cursor:pointer;
    position:relative;
    top:1px;
  }
  .tab-btn.active{
    color:var(--navy-950);
    background:var(--amber);
    border-color:var(--amber);
  }
  .tab-btn:not(.active):hover{color:var(--text-primary);}

  .panel-wrap{
    max-width:1100px;
    margin:0 auto;
    padding:0 20px;
  }
  .panel{
    border:1px solid var(--blueprint-line);
    border-radius:0 10px 10px 10px;
    background:var(--navy-900);
    padding:22px;
  }
  .panel[hidden]{display:none;}

  /* ---------- Generic components ---------- */
  .section-title{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-faint);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--blueprint-line-soft);
  }

  .period-controls{
    display:flex;
    gap:6px;
    margin-bottom:18px;
  }
  .period-btn{
    background:var(--navy-850);
    border:1px solid var(--blueprint-line);
    color:var(--text-muted);
    font-size:13px;
    padding:7px 14px;
    border-radius:6px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .period-btn.active{
    background:var(--amber-soft);
    border-color:var(--amber);
    color:var(--amber);
  }

  .kpi-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin-bottom:22px;
  }
  .kpi-card{
    border:1px solid var(--blueprint-line);
    border-radius:var(--radius);
    padding:14px 16px;
    background:var(--navy-850);
  }
  .kpi-card .kpi-label{font-size:12px;color:var(--text-muted);}
  .kpi-card .kpi-value{font-family:'JetBrains Mono',monospace;font-size:22px;margin-top:6px;font-weight:600;}
  .kpi-card .kpi-delta{font-size:12px;margin-top:6px;}
  .kpi-card.income .kpi-value{color:var(--mint);}
  .kpi-card.expense .kpi-value{color:var(--coral);}
  .kpi-card.profit .kpi-value{color:var(--amber);}
  .delta-up{color:var(--mint);}
  .delta-down{color:var(--coral);}
  .delta-flat{color:var(--text-faint);}

  .charts-row{
    display:grid;
    grid-template-columns:1.5fr 1fr;
    gap:16px;
    margin-bottom:6px;
  }
  .chart-box{
    border:1px solid var(--blueprint-line);
    border-radius:var(--radius);
    padding:16px;
    background:var(--navy-850);
    height:280px;
    position:relative;
  }
  .chart-box h3{font-size:13px;color:var(--text-muted);font-weight:500;margin-bottom:10px;font-family:'Inter',sans-serif;}
  .empty-note{
    color:var(--text-faint);
    font-size:13px;
    text-align:center;
    padding:40px 10px;
  }

  /* ---------- Forms ---------- */
  .form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
    align-items:end;
    margin-bottom:16px;
  }
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.05em;}
  .field input, .field select, .field textarea{
    background:var(--navy-950);
    border:1px solid var(--blueprint-line);
    color:var(--text-primary);
    border-radius:6px;
    padding:8px 10px;
    font-size:13px;
    font-family:'Inter',sans-serif;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:2px solid var(--amber);
    outline-offset:1px;
  }
  .checkbox-field{flex-direction:row;align-items:center;gap:7px;}
  .checkbox-field label{text-transform:none;font-size:13px;color:var(--text-muted);}
  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:13px;
    border-radius:6px;
    padding:9px 16px;
    border:1px solid var(--amber);
    background:var(--amber);
    color:var(--navy-950);
    cursor:pointer;
  }
  .btn:hover{background:#f0b558;}
  .btn.secondary{
    background:transparent;
    color:var(--amber);
  }
  .btn.secondary:hover{background:var(--amber-soft);}
  .btn.danger{
    border-color:var(--coral);
    background:transparent;
    color:var(--coral);
  }
  .btn.danger:hover{background:var(--coral-soft);}
  .btn.small{padding:5px 10px;font-size:12px;}

  .inline-add-cat{
    display:flex;
    gap:8px;
    align-items:end;
    margin:6px 0 20px;
    padding:12px;
    border:1px dashed var(--blueprint-line);
    border-radius:8px;
  }

  /* ---------- Filters + table ---------- */
  .filters-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:18px 0 14px;
  }
  .filters-row select, .filters-row input{
    background:var(--navy-950);
    border:1px solid var(--blueprint-line);
    color:var(--text-primary);
    border-radius:6px;
    padding:7px 10px;
    font-size:12px;
    font-family:'Inter',sans-serif;
  }

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--text-faint);
    padding:8px 10px;
    border-bottom:1px solid var(--blueprint-line);
  }
  tbody td{
    padding:9px 10px;
    border-bottom:1px solid var(--blueprint-line-soft);
    color:var(--text-primary);
  }
  tbody tr:hover{background:var(--navy-850);}
  .tag-pill{
    font-size:10px;
    padding:2px 8px;
    border-radius:20px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .tag-business{background:var(--amber-soft);color:var(--amber);}
  .tag-personal{background:var(--blueprint-line-soft);color:var(--text-muted);}
  .amount-income{color:var(--mint);font-family:'JetBrains Mono',monospace;}
  .amount-expense{color:var(--coral);font-family:'JetBrains Mono',monospace;}
  .table-total{
    margin-top:10px;
    font-size:13px;
    color:var(--text-muted);
    text-align:right;
  }
  .table-total span{color:var(--text-primary);font-family:'JetBrains Mono',monospace;}

  /* ---------- Business ideas ---------- */
  .ideas-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:14px;
    margin-top:14px;
  }
  .idea-card{
    border:1px solid var(--blueprint-line);
    border-radius:var(--radius);
    background:var(--navy-850);
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .idea-card h4{font-family:'Space Grotesk',sans-serif;font-size:15px;margin:0;}
  .idea-card p{font-size:12.5px;color:var(--text-muted);margin:0;line-height:1.4;}
  .idea-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-top:auto;}
  .idea-budget{font-family:'JetBrains Mono',monospace;color:var(--amber);}
  .status-badge{
    font-size:10px;
    padding:3px 9px;
    border-radius:20px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .status-idea{background:var(--blueprint-line-soft);color:var(--text-muted);}
  .status-in_progress{background:var(--amber-soft);color:var(--amber);}
  .status-done{background:var(--mint-soft);color:var(--mint);}
  .idea-actions{display:flex;gap:6px;align-items:center;}
  .idea-actions select{
    background:var(--navy-950);border:1px solid var(--blueprint-line);color:var(--text-primary);
    border-radius:5px;font-size:11px;padding:4px 6px;
  }

  footer.reset-bar{
    max-width:1100px;
    margin:18px auto 0;
    padding:0 20px;
    display:flex;
    justify-content:flex-end;
  }
  .reset-link{
    font-size:12px;
    color:var(--text-faint);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration:underline;
  }
  .reset-link:hover{color:var(--coral);}

  .loading{
    text-align:center;
    padding:60px 20px;
    color:var(--text-faint);
    font-size:13px;
  }

  @media (max-width:720px){
    .form-grid{grid-template-columns:1fr 1fr;}
    .kpi-row{grid-template-columns:1fr;}
    .charts-row{grid-template-columns:1fr;}
    .tb-meta{flex-wrap:wrap;}
  }
</style>
</head>
<body>

<div class="titleblock">
  <div class="titleblock-inner">
    <div class="tb-brand">
      <h1>ФИНУЧЁТ</h1>
      <p>Учёт доходов, расходов и бизнес-направлений</p>
    </div>
    <div class="tb-meta">
      <div class="tb-cell"><span class="label">Объект</span><span class="value mono" id="metaScope">Личное + бизнес</span></div>
      <div class="tb-cell"><span class="label">Операций</span><span class="value mono" id="metaCount">0</span></div>
      <div class="tb-cell"><span class="label">Обновлено</span><span class="value mono" id="metaDate">—</span></div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="overview">Обзор</button>
  <button class="tab-btn" data-tab="operations">Операции</button>
  <button class="tab-btn" data-tab="business">Бизнес</button>
</div>

<div class="panel-wrap">
  <div class="panel" id="app-root">
    <div class="loading">Загрузка данных…</div>
  </div>
</div>

<footer class="reset-bar">
  <button class="reset-link" id="resetBtn">Сбросить все данные</button>
</footer>

<script>
/* ============================================================
   STATE
============================================================ */
const state = {
  transactions: [],
  categories: [],
  ideas: [],
  ready: false,
  activeTab: 'overview',
  overviewGranularity: 'month',
  businessGranularity: 'month',
  filters: { type:'all', category:'all', tag:'all', from:'', to:'', q:'' },
  confirmDeleteTx: null,
  confirmDeleteIdea: null,
};

const DEFAULT_CATEGORIES = [
  { id: cid(), name: 'Заказы клиентов', type: 'income' },
  { id: cid(), name: 'Прочий доход', type: 'income' },
  { id: cid(), name: 'Материалы', type: 'expense' },
  { id: cid(), name: 'Инструмент', type: 'expense' },
  { id: cid(), name: 'Реклама', type: 'expense' },
  { id: cid(), name: 'Транспорт', type: 'expense' },
  { id: cid(), name: 'Обучение', type: 'expense' },
  { id: cid(), name: 'Прочий расход', type: 'expense' },
];

function cid(){ return 'c_' + Math.random().toString(36).slice(2,10); }
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

/* ============================================================
   STORAGE — Telegram CloudStorage (falls back to localStorage
   when opened outside Telegram, e.g. testing the link directly)
============================================================ */
const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
if(tg){ try{ tg.ready(); tg.expand(); }catch(e){} }
function cloudAvailable(){ return !!(tg && tg.CloudStorage); }

function csSetItem(key, value){
  return new Promise((resolve,reject)=>{
    tg.CloudStorage.setItem(key, value, (err, ok)=> err ? reject(err) : resolve(ok));
  });
}
function csGetItem(key){
  return new Promise((resolve,reject)=>{
    tg.CloudStorage.getItem(key, (err, val)=> err ? reject(err) : resolve(val));
  });
}
function csGetItems(keys){
  return new Promise((resolve,reject)=>{
    if(!keys.length){ resolve({}); return; }
    tg.CloudStorage.getItems(keys, (err, vals)=> err ? reject(err) : resolve(vals));
  });
}
function csRemoveItem(key){
  return new Promise((resolve,reject)=>{
    tg.CloudStorage.removeItem(key, (err, ok)=> err ? reject(err) : resolve(ok));
  });
}

async function storeGet(key){
  try{
    if(cloudAvailable()) return (await csGetItem(key)) || null;
    return localStorage.getItem('finuchet:'+key);
  }catch(e){ console.error('storeGet failed', key, e); return null; }
}
async function storeSet(key, value){
  try{
    if(cloudAvailable()) await csSetItem(key, value);
    else localStorage.setItem('finuchet:'+key, value);
  }catch(e){ console.error('storeSet failed', key, e); }
}
async function storeRemove(key){
  try{
    if(cloudAvailable()) await csRemoveItem(key);
    else localStorage.removeItem('finuchet:'+key);
  }catch(e){ console.error('storeRemove failed', key, e); }
}
async function storeGetMany(keys){
  try{
    if(cloudAvailable()) return await csGetItems(keys);
    const res = {}; keys.forEach(k => res[k] = localStorage.getItem('finuchet:'+k) || '');
    return res;
  }catch(e){ console.error('storeGetMany failed', e); return {}; }
}

async function loadAll(){
  try{
    const idxRaw = await storeGet('tx_index');
    const ids = idxRaw ? JSON.parse(idxRaw) : [];
    if(ids.length){
      const map = await storeGetMany(ids.map(id => 'tx_' + id));
      state.transactions = ids
        .map(id => map['tx_' + id])
        .filter(Boolean)
        .map(v => { try{ return JSON.parse(v); }catch(e){ return null; } })
        .filter(Boolean);
    } else {
      state.transactions = [];
    }
  }catch(e){ console.error('load transactions failed', e); state.transactions = []; }

  try{
    const c = await storeGet('categories');
    state.categories = c ? JSON.parse(c) : [];
  }catch(e){ state.categories = []; }
  if(!state.categories.length){
    state.categories = DEFAULT_CATEGORIES;
    await saveCategories();
  }

  try{
    const i = await storeGet('ideas');
    state.ideas = i ? JSON.parse(i) : [];
  }catch(e){ state.ideas = []; }

  state.ready = true;
}

async function addTransactionRemote(tx){
  await storeSet('tx_' + tx.id, JSON.stringify(tx));
  const idxRaw = await storeGet('tx_index');
  const ids = idxRaw ? JSON.parse(idxRaw) : [];
  ids.push(tx.id);
  await storeSet('tx_index', JSON.stringify(ids));
}
async function removeTransactionRemote(id){
  await storeRemove('tx_' + id);
  const idxRaw = await storeGet('tx_index');
  const ids = (idxRaw ? JSON.parse(idxRaw) : []).filter(x => x !== id);
  await storeSet('tx_index', JSON.stringify(ids));
}
async function saveCategories(){
  await storeSet('categories', JSON.stringify(state.categories));
}
async function saveIdeas(){
  await storeSet('ideas', JSON.stringify(state.ideas));
}
async function resetAllRemote(){
  for(const t of state.transactions){ await storeRemove('tx_' + t.id); }
  await storeRemove('tx_index');
  await storeRemove('categories');
  await storeRemove('ideas');
}

/* ============================================================
   HELPERS
============================================================ */
function money(n){
  const v = Math.round(n);
  return v.toLocaleString('ru-RU') + ' ₽';
}
function signedMoney(n){
  const sign = n > 0 ? '+' : (n < 0 ? '−' : '');
  return sign + Math.abs(Math.round(n)).toLocaleString('ru-RU') + ' ₽';
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function catName(id){
  const c = state.categories.find(c=>c.id===id);
  return c ? c.name : '—';
}
function categoriesByType(type){
  return state.categories.filter(c=>c.type===type);
}

/* Sum helpers */
function sumTx(txs, type){
  return txs.filter(t=>t.type===type).reduce((s,t)=>s+t.amount,0);
}

/* Period bucketing for current/previous comparison */
function periodKey(dateStr, granularity){
  const d = new Date(dateStr + 'T00:00:00');
  if(granularity === 'day') return dateStr;
  if(granularity === 'month') return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  if(granularity === 'year') return String(d.getFullYear());
}
function shiftPeriod(granularity, offset){
  const now = new Date();
  if(granularity === 'day'){
    now.setDate(now.getDate() + offset);
    return now.toISOString().slice(0,10);
  }
  if(granularity === 'month'){
    now.setMonth(now.getMonth() + offset);
    return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  }
  if(granularity === 'year'){
    now.setFullYear(now.getFullYear() + offset);
    return String(now.getFullYear());
  }
}

function currentPreviousStats(txs, granularity){
  const curKey = shiftPeriod(granularity, 0);
  const prevKey = shiftPeriod(granularity, -1);
  const cur = txs.filter(t => periodKey(t.date, granularity) === curKey);
  const prev = txs.filter(t => periodKey(t.date, granularity) === prevKey);
  const curIncome = sumTx(cur,'income'), curExpense = sumTx(cur,'expense');
  const prevIncome = sumTx(prev,'income'), prevExpense = sumTx(prev,'expense');
  return {
    income: curIncome, expense: curExpense, profit: curIncome - curExpense,
    prevIncome, prevExpense, prevProfit: prevIncome - prevExpense,
  };
}

function pctDelta(cur, prev){
  if(prev === 0){ return cur === 0 ? 0 : null; }
  return ((cur - prev) / Math.abs(prev)) * 100;
}

function deltaHtml(cur, prev, positiveIsGood=true){
  const d = pctDelta(cur, prev);
  if(d === null) return '<span class="delta-flat">новое</span>';
  const good = positiveIsGood ? d >= 0 : d <= 0;
  const cls = d === 0 ? 'delta-flat' : (good ? 'delta-up' : 'delta-down');
  const arrow = d > 0 ? '↑' : (d < 0 ? '↓' : '·');
  return `<span class="${cls}">${arrow} ${Math.abs(d).toFixed(1)}% к пред. периоду</span>`;
}

/* Build trend buckets for chart */
function trendBuckets(txs, granularity){
  const now = new Date();
  let labels = [], keys = [];
  if(granularity === 'day'){
    for(let i=13;i>=0;i--){
      const d = new Date(now); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      keys.push(key);
      labels.push(d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}));
    }
  } else if(granularity === 'month'){
    for(let i=11;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      keys.push(key);
      labels.push(d.toLocaleDateString('ru-RU',{month:'short',year:'2-digit'}));
    }
  } else {
    const years = new Set(txs.map(t=>new Date(t.date).getFullYear()));
    years.add(now.getFullYear());
    const sorted = Array.from(years).sort();
    const minY = sorted[0], maxY = now.getFullYear();
    for(let y=minY; y<=maxY; y++){ keys.push(String(y)); labels.push(String(y)); }
  }
  const income = keys.map(k => sumTx(txs.filter(t=>periodKey(t.date,granularity)===k), 'income'));
  const expense = keys.map(k => sumTx(txs.filter(t=>periodKey(t.date,granularity)===k), 'expense'));
  return { labels, income, expense };
}

/* Category breakdown for current period (expenses) */
function categoryBreakdown(txs, granularity){
  const curKey = shiftPeriod(granularity, 0);
  const cur = txs.filter(t => periodKey(t.date, granularity) === curKey && t.type === 'expense');
  const map = {};
  cur.forEach(t=>{ map[t.category] = (map[t.category]||0) + t.amount; });
  const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  return {
    labels: entries.map(e=>catName(e[0])),
    values: entries.map(e=>e[1]),
  };
}

/* ============================================================
   CHART INSTANCES
============================================================ */
let trendChartInst = null, catChartInst = null, bizTrendChartInst = null;

const CHART_COLORS = {
  income:'#4ADE80', expense:'#F2685C', grid:'#1C3854', text:'#8FA6C2',
  palette:['#E8A33D','#4ADE80','#5B9BD5','#F2685C','#C084FC','#F2C94C','#5EEAD4','#FB923C']
};

function baseChartOptions(){
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ labels:{ color: CHART_COLORS.text, font:{family:'Inter', size:11} } } },
    scales:{
      x:{ ticks:{ color: CHART_COLORS.text, font:{size:10} }, grid:{ color: CHART_COLORS.grid } },
      y:{ ticks:{ color: CHART_COLORS.text, font:{size:10} }, grid:{ color: CHART_COLORS.grid } }
    }
  };
}

function renderTrendChart(canvasId, txs, granularity, instRef){
  const el = document.getElementById(canvasId);
  if(!el) return null;
  const { labels, income, expense } = trendBuckets(txs, granularity);
  if(instRef) instRef.destroy();
  return new Chart(el, {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'Доход', data:income, backgroundColor: CHART_COLORS.income, borderRadius:3 },
        { label:'Расход', data:expense, backgroundColor: CHART_COLORS.expense, borderRadius:3 },
      ]
    },
    options: baseChartOptions()
  });
}

function renderCategoryChart(canvasId, txs, granularity, instRef){
  const el = document.getElementById(canvasId);
  if(!el) return null;
  const { labels, values } = categoryBreakdown(txs, granularity);
  const wrap = el.closest('.chart-box');
  if(!labels.length){
    if(instRef) instRef.destroy();
    el.style.display='none';
    if(!wrap.querySelector('.empty-note')){
      const p = document.createElement('div');
      p.className='empty-note';
      p.textContent='Нет расходов за этот период';
      wrap.appendChild(p);
    }
    return null;
  }
  const existingEmpty = wrap.querySelector('.empty-note');
  if(existingEmpty) existingEmpty.remove();
  el.style.display='block';
  if(instRef) instRef.destroy();
  return new Chart(el, {
    type:'doughnut',
    data:{ labels, datasets:[{ data: values, backgroundColor: CHART_COLORS.palette, borderColor: CHART_COLORS.grid, borderWidth:2 }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'right', labels:{ color: CHART_COLORS.text, font:{family:'Inter', size:10}, boxWidth:10 } } }
    }
  });
}

function applyFilters(txs){
  return txs.filter(t=>{
    if(state.filters.type !== 'all' && t.type !== state.filters.type) return false;
    if(state.filters.category !== 'all' && t.category !== state.filters.category) return false;
    if(state.filters.tag !== 'all' && t.tag !== state.filters.tag) return false;
    if(state.filters.from && t.date < state.filters.from) return false;
    if(state.filters.to && t.date > state.filters.to) return false;
    if(state.filters.q){
      const q = state.filters.q.toLowerCase();
      const hay = (t.note + ' ' + catName(t.category)).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=> b.date.localeCompare(a.date));
}

function renderTxTable(){
  const tbody = document.getElementById('txTableBody');
  const emptyNote = document.getElementById('txEmptyNote');
  if(!tbody) return;
  const filtered = applyFilters(state.transactions);

  if(!filtered.length){
    tbody.innerHTML = '';
    emptyNote.innerHTML = '<div class="empty-note">Операций по этому фильтру не найдено</div>';
  } else {
    emptyNote.innerHTML = '';
    tbody.innerHTML = filtered.map(t => `
      <tr>
        <td class="mono">${fmtDate(t.date)}</td>
        <td>${t.type === 'income' ? 'Доход' : 'Расход'}</td>
        <td>${catName(t.category)}</td>
        <td>${t.note ? t.note : '—'}</td>
        <td><span class="tag-pill ${t.tag==='business'?'tag-business':'tag-personal'}">${t.tag==='business'?'Бизнес':'Личное'}</span></td>
        <td style="text-align:right;" class="${t.type==='income'?'amount-income':'amount-expense'}">${t.type==='income'?'+':'−'}${money(t.amount)}</td>
        <td style="text-align:right;">
          <button class="btn danger small" data-del-tx="${t.id}">${state.confirmDeleteTx===t.id?'Точно?':'Удалить'}</button>
        </td>
      </tr>
    `).join('');
  }

  const total = sumTx(filtered,'income') - sumTx(filtered,'expense');
  const totalEl = document.querySelector('.table-total span');
  if(totalEl) totalEl.textContent = signedMoney(total);

  document.querySelectorAll('[data-del-tx]').forEach(btn=>{
    btn.addEventListener('click', async () => {
      const id = btn.dataset.delTx;
      if(state.confirmDeleteTx === id){
        await removeTransactionRemote(id);
        state.transactions = state.transactions.filter(t=>t.id !== id);
        state.confirmDeleteTx = null;
        renderOperations();
        updateMeta();
      } else {
        state.confirmDeleteTx = id;
        renderTxTable();
        setTimeout(()=>{ if(state.confirmDeleteTx===id){ state.confirmDeleteTx=null; renderTxTable(); } }, 3000);
      }
    });
  });
}

}

  if(!state.ready) return;

  else if(state.activeTab === 'operations') renderOperations();
  else if(state.activeTab === 'business') renderBusiness();
