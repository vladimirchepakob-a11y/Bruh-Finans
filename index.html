<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Финансовый ассистент</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<!-- ===================================================== -->
<!-- LOADER -->
<!-- ===================================================== -->

<div id="loader"></div>

<!-- ===================================================== -->
<!-- APP -->
<!-- ===================================================== -->

<div id="app">

<!-- ===================================================== -->
<!-- SIDEBAR -->
<!-- ===================================================== -->

<aside id="sidebar">

<div class="logo">

💰 Финансовый Ассистент

</div>

<nav>

<button class="active" data-page="dashboard">

🏠 Главная

</button>

<button data-page="transactions">

💳 Доходы и расходы

</button>

<button data-page="sidejobs">

💼 Подработки

</button>

<button data-page="investments">

📈 Инвестиции

</button>

<button data-page="savings">

🏦 Накопления

</button>

<button data-page="analytics">

📊 Аналитика

</button>

<button data-page="calendar">

📅 Календарь

</button>

<button data-page="reports">

📑 Отчёты

</button>

<button data-page="settings">

⚙ Настройки

</button>

</nav>

</aside>

<!-- ===================================================== -->
<!-- CONTENT -->
<!-- ===================================================== -->

<main id="content">

<header id="topbar">

<h1 id="pageTitle">

Главная

</h1>

<div id="topActions">

<button>

🔍 Поиск

</button>

<button>

🔔 Уведомления

</button>

<button>

👤 Профиль

</button>

</div>

</header>

<!-- ===================================================== -->
<!-- DASHBOARD -->
<!-- ===================================================== -->

<section
class="page"
id="dashboard">

<div class="grid">

<div
id="balanceCard"
class="card">

</div>

<div
id="incomeCard"
class="card">

</div>

<div
id="expenseCard"
class="card">

</div>

<div
id="financialHealthCard"
class="card">

</div>

<div
id="investmentCard"
class="card">

</div>

<div
id="savingsCard"
class="card">

</div>

<div
id="cashflowChart"
class="card">

</div>

<div
id="balanceChart"
class="card">

</div>

<div
id="recentTransactions"
class="card">

</div>

</div>

</section>
<!-- ===================================================== -->
<!-- ДОХОДЫ И РАСХОДЫ -->
<!-- ===================================================== -->

<section
class="page"
id="transactions">

<div class="card">

<h2>

Доходы и расходы

</h2>

<div id="transactionToolbar"></div>

<div id="transactionFilters"></div>

<div id="transactionTable"></div>

</div>

</section>

<!-- ===================================================== -->
<!-- ПОДРАБОТКИ -->
<!-- ===================================================== -->

<section
class="page"
id="sidejobs">

<div class="card">

<h2>

Подработки

</h2>

<div id="sidejobStatistics"></div>

<div id="sidejobTable"></div>

</div>

</section>

<!-- ===================================================== -->
<!-- ИНВЕСТИЦИИ -->
<!-- ===================================================== -->

<section
class="page"
id="investments">

<div class="card">

<h2>

Инвестиции

</h2>

<div id="investmentOverview"></div>

<div id="investmentTable"></div>

</div>

</section>

<!-- ===================================================== -->
<!-- НАКОПЛЕНИЯ -->
<!-- ===================================================== -->

<section
class="page"
id="savings">

<div class="card">

<h2>

Накопления

</h2>

<div id="accounts"></div>

<div id="goals"></div>

</div>

</section>

<!-- ===================================================== -->
<!-- АНАЛИТИКА -->
<!-- ===================================================== -->

<section
class="page"
id="analytics">

<div class="card">

<h2>

Аналитика

</h2>

<div id="analyticsToolbar"></div>

<div id="analyticsGrid"></div>

</div>

</section>
<!-- ===================================================== -->
<!-- КАЛЕНДАРЬ -->
<!-- ===================================================== -->

<section
class="page"
id="calendar">

<div class="card">

<h2>

📅 Финансовый календарь

</h2>

<div id="calendarContainer">

</div>

</div>

</section>

<!-- ===================================================== -->
<!-- ОТЧЕТЫ -->
<!-- ===================================================== -->

<section
class="page"
id="reports">

<div class="card">

<h2>

📄 Отчеты

</h2>

<div id="reportGenerator">

</div>

<div id="reportPreview">

</div>

</div>

</section>

<!-- ===================================================== -->
<!-- НАСТРОЙКИ -->
<!-- ===================================================== -->

<section
class="page"
id="settings">

<div class="card">

<h2>

⚙ Настройки

</h2>

<div id="settingsContainer">

</div>

</div>

</section>

</main>

</div>

<!-- ===================================================== -->
<!-- МОДАЛЬНОЕ ОКНО -->
<!-- ===================================================== -->

<div id="modalOverlay">

<div id="modalWindow">

<div id="modalContent">

</div>

</div>

</div>

<!-- ===================================================== -->
<!-- TOAST -->
<!-- ===================================================== -->

<div id="toastContainer">

</div>

<!-- ===================================================== -->
<!-- JAVASCRIPT -->
<!-- ===================================================== -->

<script src="js/storage.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/transactions.js"></script>

<script src="js/sidejobs.js"></script>

<script src="js/investments.js"></script>

<script src="js/savings.js"></script>

<script src="js/analytics.js"></script>

<script src="js/calendar.js"></script>

<script src="js/reports.js"></script>

<script src="js/settings.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>

</html>
